name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main

# Grant explicit permissions so the workflow can create/update the `gh-pages`
# branch using the built-in GITHUB_TOKEN. If your repository or org restricts
# Actions permissions, you may still need to use a personal access token.
permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  # keep the GITHUB_TOKEN available for subsequent steps
                  persist-credentials: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              # Try a clean install first; if lockfile is out-of-sync `npm ci` will fail
              # so fall back to `npm install` with offline preference to speed up.
              run: |
                  npm ci --prefer-offline --no-audit --no-fund || npm install --prefer-offline --no-audit --no-fund

            - name: Build
              run: npm run build

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
